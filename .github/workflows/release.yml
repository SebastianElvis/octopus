name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci --legacy-peer-deps

      # ── Apple code signing setup ────────────────────────────────────
      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain for CI
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add to search list (prepend so it's found first)
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Clean up the decoded cert
          rm $RUNNER_TEMP/certificate.p12

      # ── Build with signing + notarization ───────────────────────────
      - name: Build (aarch64)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npx tauri build --target aarch64-apple-darwin

      - name: Build (x86_64)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npx tauri build --target x86_64-apple-darwin

      # Step 2: Notarize the .app bundles separately (with timeout)
      - name: Notarize (aarch64)
        continue-on-error: true
        timeout-minutes: 15
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          echo "Notarizing $APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" /tmp/notarize-arm64.zip
          xcrun notarytool submit /tmp/notarize-arm64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m
          xcrun stapler staple "$APP_PATH"

      - name: Notarize (x86_64)
        continue-on-error: true
        timeout-minutes: 15
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          echo "Notarizing $APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" /tmp/notarize-x64.zip
          xcrun notarytool submit /tmp/notarize-x64.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m
          xcrun stapler staple "$APP_PATH"

      - name: Collect artifacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg "release-artifacts/Octopus_${TAG_NAME}_aarch64.dmg"
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg "release-artifacts/Octopus_${TAG_NAME}_x64.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: release-artifacts/*

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npx tauri build

      - name: Collect artifacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/release/bundle/deb/*.deb "release-artifacts/Octopus_${TAG_NAME}_amd64.deb"
          cp src-tauri/target/release/bundle/appimage/*.AppImage "release-artifacts/Octopus_${TAG_NAME}_amd64.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts/*

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npx tauri build

      - name: Collect artifacts
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/release/bundle/nsis/*.exe "release-artifacts/Octopus_${TAG_NAME}_x64-setup.exe"
          cp src-tauri/target/release/bundle/msi/*.msi "release-artifacts/Octopus_${TAG_NAME}_x64.msi"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts/*

  publish-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-artifacts/*
